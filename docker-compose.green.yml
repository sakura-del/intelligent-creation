services:
  frontend-green:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      backend-green:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  backend-green:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - upload-data:/app/uploads
      - log-data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ai_resume_root}
      MYSQL_DATABASE: ${DB_NAME:-ai_resume}
      MYSQL_USER: ${DB_USER:-ai_resume}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ai_resume_pass}
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql-data:
  upload-data:
  log-data:

networks:
  app-network:
    driver: bridge
